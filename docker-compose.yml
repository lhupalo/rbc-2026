services:
  lb:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "32MB"

  api1:
    image: ${API_IMAGE:?defina API_IMAGE com uma imagem publica linux/amd64}
    platform: linux/amd64
    expose:
      - "8080"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "159MB"

  api2:
    image: ${API_IMAGE:?defina API_IMAGE com uma imagem publica linux/amd64}
    platform: linux/amd64
    expose:
      - "8080"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "159MB"

networks:
  app:
    driver: bridge
