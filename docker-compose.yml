services:
  lb:
    container_name: lb
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "32MB"

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    image: api1
    expose:
      - "8080"
    environment:
      - GOMEMLIMIT=148MiB
      - GOMAXPROCS=1
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "159MB"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    image: api2
    expose:
      - "8080"
    environment:
      - GOMEMLIMIT=148MiB
      - GOMAXPROCS=1
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "159MB"

networks:
  app:
    driver: bridge
